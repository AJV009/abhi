<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>hey abhi.</title>
<base href="./" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Homemade+Apple&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:          #FBF7F0;
    --ink:         #1a1613;
    --ink-soft:    #4a443e;
    --ink-mute:    #8a8279;
    --rule:        #e7dfd1;
    --accent:      oklch(0.62 0.11 40);       /* dusty terracotta */
    --accent-soft: oklch(0.62 0.11 40 / 0.12);
    --accent-ink:  oklch(0.42 0.09 40);
    --card:        #ffffff;
    --shadow:      0 1px 2px rgba(60,40,20,.04), 0 12px 40px -12px rgba(60,40,20,.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 17px;
    line-height: 1.55;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* subtle paper texture — very faint, almost imperceptible */
  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(180,130,80,.04), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(180,130,80,.035), transparent 60%);
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  .serif { font-family: "Fraunces", "Cochin", Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .script { font-family: "Homemade Apple", "Caveat", cursive; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }

  /* ——————————— layout ——————————— */
  .page {
    min-height: 100svh;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 48px 24px 32px;
  }
  @media (min-width: 700px) {
    .page { padding: 80px 32px 48px; }
  }

  .sheet {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    align-self: center;
  }

  /* ——————————— typography ——————————— */
  .hello {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(56px, 14vw, 104px);
    line-height: 0.98;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 0 0 28px;
    font-variation-settings: "opsz" 144, "SOFT" 50;
  }
  .hello .dot { color: var(--accent); }

  .lede {
    font-family: "Fraunces", serif;
    font-weight: 400;
    font-size: clamp(20px, 4.2vw, 26px);
    line-height: 1.4;
    color: var(--ink-soft);
    letter-spacing: -0.012em;
    max-width: 34ch;
    text-wrap: pretty;
    margin: 0 0 44px;
  }
  .lede em {
    font-style: italic;
    color: var(--accent-ink);
    font-variation-settings: "opsz" 14;
  }

  .ps {
    font-family: "Homemade Apple", cursive;
    font-size: clamp(17px, 3.2vw, 20px);
    line-height: 1.55;
    color: var(--ink-mute);
    max-width: 28ch;
  }

  .ps .prefix {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 0.9em;
    margin-right: 6px;
    color: var(--ink-mute);
  }

  /* breathing — gentle, only on hello */
  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }
  .hello { animation: breathe 7s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .hello { animation: none; }
  }

  /* ——————————— countdown ——————————— */
  .countdown {
    display: inline-flex;
    align-items: baseline;
    gap: 18px;
    padding: 14px 0 32px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin: 0 0 40px;
    width: 100%;
    justify-content: flex-start;
    padding: 18px 0;
  }
  .cd-unit { display: flex; align-items: baseline; gap: 8px; }
  .cd-num {
    font-family: "Fraunces", serif;
    font-weight: 400;
    font-size: clamp(38px, 8vw, 56px);
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    min-width: 2ch;
    text-align: right;
    transition: transform .35s cubic-bezier(.2,.7,.2,1);
  }
  .cd-label {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .cd-sep {
    color: var(--rule);
    font-family: "Fraunces", serif;
    font-size: clamp(34px, 7vw, 48px);
    font-weight: 300;
    line-height: 1;
    align-self: center;
  }

  /* ——————————— locked state ——————————— */
  .hint {
    font-family: "Fraunces", serif;
    font-size: clamp(18px, 3.6vw, 22px);
    line-height: 1.45;
    color: var(--ink-soft);
    margin: 0 0 28px;
    max-width: 32ch;
    font-style: italic;
  }
  .hint .fmt {
    font-family: "JetBrains Mono", monospace;
    font-style: normal;
    font-size: 0.82em;
    background: var(--accent-soft);
    color: var(--accent-ink);
    padding: 2px 8px;
    border-radius: 3px;
    margin-left: 4px;
    letter-spacing: 0.05em;
  }

  .pw-wrap {
    position: relative;
    width: 100%;
    max-width: 340px;
  }

  .pw-input {
    width: 100%;
    font-family: "JetBrains Mono", monospace;
    font-size: clamp(28px, 6vw, 34px);
    font-weight: 500;
    letter-spacing: 0.18em;
    text-align: center;
    padding: 18px 44px 18px 16px;
    background: transparent;
    color: var(--ink);
    border: none;
    border-bottom: 1.5px solid var(--ink-mute);
    outline: none;
    caret-color: var(--accent);
    transition: border-color .2s ease;
    font-variant-numeric: tabular-nums;
  }
  .pw-input::placeholder {
    color: oklch(0.7 0 0 / 0.35);
    letter-spacing: 0.25em;
    font-weight: 400;
  }
  .pw-input:focus {
    border-bottom-color: var(--accent);
  }
  .pw-input:-webkit-autofill { box-shadow: 0 0 0 1000px var(--bg) inset; }

  .pw-submit {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    display: grid;
    place-items: center;
    border-radius: 50%;
    transition: color .2s ease, background .2s ease, transform .2s ease;
  }
  .pw-submit:hover,
  .pw-submit:focus-visible {
    color: var(--accent);
    background: var(--accent-soft);
    outline: none;
    transform: translateY(-50%) translateX(2px);
  }
  .pw-submit:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .pw-error {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 16px;
    color: var(--accent-ink);
    margin-top: 18px;
    min-height: 22px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity .25s ease, transform .25s ease;
  }
  .pw-error.show {
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .pw-wrap.shake { animation: shake .45s cubic-bezier(.36,.07,.19,.97) both; }
  @media (prefers-reduced-motion: reduce) {
    .pw-wrap.shake { animation: none; }
  }

  .pw-hint-key {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    color: var(--ink-mute);
    margin-top: 14px;
    letter-spacing: 0.02em;
  }
  .pw-hint-key kbd {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    padding: 2px 6px;
    background: #fff;
    border: 1px solid var(--rule);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--ink-soft);
  }

  /* ——————————— unlocked state ——————————— */
  .reveal-head {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(44px, 10vw, 72px);
    line-height: 1;
    letter-spacing: -0.03em;
    margin: 0 0 36px;
    color: var(--ink);
  }
  .reveal-head .em { display: inline-block; margin-left: 4px; }

  .qr-card {
    background: #fff;
    padding: 28px;
    border-radius: 6px;
    box-shadow: var(--shadow);
    display: inline-block;
    position: relative;
    margin: 0 0 28px;
  }
  .qr-card::after {
    content: "";
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(0,0,0,.04);
    border-radius: 3px;
    pointer-events: none;
  }
  .qr-img, .qr-svg {
    display: block;
    width: clamp(240px, 70vw, 320px);
    height: clamp(240px, 70vw, 320px);
    image-rendering: pixelated;
  }

  .gift-meta {
    font-family: "Fraunces", serif;
    font-size: clamp(20px, 4.2vw, 24px);
    line-height: 1.45;
    color: var(--ink-soft);
    margin: 0 0 8px;
    letter-spacing: -0.012em;
  }
  .gift-meta strong {
    color: var(--ink);
    font-weight: 500;
  }
  .gift-meta .amount {
    color: var(--accent);
    font-weight: 500;
  }

  .gift-note {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: clamp(17px, 3.6vw, 20px);
    line-height: 1.5;
    color: var(--ink-soft);
    max-width: 30ch;
    margin: 18px 0 36px;
    text-wrap: pretty;
  }

  .download-btn {
    font-family: "Inter", sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid var(--rule);
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all .2s ease;
  }
  .download-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .download-btn svg { width: 14px; height: 14px; }

  /* wax seal — placeholder state corner */
  .seal {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 400;
    transform: rotate(-12deg);
    box-shadow: 0 2px 0 rgba(0,0,0,.08), 0 8px 24px -6px rgba(140,60,30,.35);
    opacity: 0.88;
    pointer-events: none;
    z-index: 2;
  }
  .seal::before {
    content: "";
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(255,255,255,.4);
    border-radius: 50%;
  }
  @media (max-width: 520px) {
    .seal { bottom: 20px; right: 20px; width: 48px; height: 48px; font-size: 16px; }
  }

  /* ——————————— state transitions ——————————— */
  .state-layer {
    transition: opacity .45s ease, transform .45s cubic-bezier(.2,.7,.2,1);
  }
  .state-layer.enter {
    opacity: 0;
    transform: translateY(8px);
  }
  .state-layer.enter-active,
  .state-layer.idle {
    opacity: 1;
    transform: translateY(0);
  }
  .state-layer.exit-active {
    opacity: 0;
    transform: translateY(-8px);
  }
  @media (prefers-reduced-motion: reduce) {
    .state-layer,
    .state-layer.enter,
    .state-layer.enter-active,
    .state-layer.exit-active { transition: opacity .2s ease; transform: none; }
  }

  /* confetti */
  .confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 3;
  }
  .confetti span {
    position: absolute;
    width: 8px; height: 12px;
    top: 40%;
    left: 50%;
    opacity: 0;
    will-change: transform, opacity;
  }
  @keyframes burst {
    0%   { opacity: 1; transform: translate(0,0) rotate(0); }
    100% { opacity: 0; transform: var(--to) rotate(540deg); }
  }
  .confetti.go span { animation: burst 1.2s cubic-bezier(.15,.6,.3,1) forwards; }
  @media (prefers-reduced-motion: reduce) {
    .confetti.go span { animation: none; opacity: 0; }
  }

  /* footer breadcrumb — only in tweaks mode preview */
  .dev-note {
    position: fixed;
    bottom: 12px;
    left: 12px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--ink-mute);
    opacity: 0.5;
    letter-spacing: 0.05em;
    z-index: 4;
  }

  /* accent hue variations via tweaks */
  [data-accent="terracotta"] { --accent: oklch(0.62 0.11 40); --accent-soft: oklch(0.62 0.11 40 / 0.12); --accent-ink: oklch(0.42 0.09 40); }
  [data-accent="marigold"]   { --accent: oklch(0.72 0.13 75); --accent-soft: oklch(0.72 0.13 75 / 0.15); --accent-ink: oklch(0.48 0.10 70); }
  [data-accent="rose"]       { --accent: oklch(0.64 0.09 15); --accent-soft: oklch(0.64 0.09 15 / 0.14); --accent-ink: oklch(0.44 0.08 15); }
  [data-accent="ink"]        { --accent: oklch(0.35 0.04 40); --accent-soft: oklch(0.35 0.04 40 / 0.12); --accent-ink: oklch(0.25 0.03 40); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
