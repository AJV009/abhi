<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>hey abhi.</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=Homemade+Apple&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:          #FBF7F0;
    --ink:         #1a1613;
    --ink-soft:    #4a443e;
    --ink-mute:    #8a8279;
    --rule:        #e7dfd1;
    --accent:      oklch(0.62 0.11 40);       /* dusty terracotta */
    --accent-soft: oklch(0.62 0.11 40 / 0.12);
    --accent-ink:  oklch(0.42 0.09 40);
    --saffron:     oklch(0.75 0.14 70);       /* marigold petals */
    --card:        #ffffff;
    --shadow:      0 1px 2px rgba(60,40,20,.04), 0 12px 40px -12px rgba(60,40,20,.12);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 17px;
    line-height: 1.55;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    min-height: 100svh;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(180,130,80,.04), transparent 60%),
      radial-gradient(900px 600px at 100% 100%, rgba(180,130,80,.035), transparent 60%);
    z-index: 0;
  }

  #root { position: relative; z-index: 1; }

  .serif  { font-family: "Fraunces", "Cochin", Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }
  .script { font-family: "Homemade Apple", "Caveat", cursive; }
  .mono   { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace; }

  .page {
    min-height: 100svh;
    min-height: 100vh;
    display: grid;
    grid-template-rows: 1fr auto;
    padding: 48px 24px 32px;
  }
  @media (min-width: 700px) {
    .page { padding: 80px 32px 48px; }
  }

  .sheet {
    width: 100%;
    max-width: 560px;
    margin: 0 auto;
    align-self: center;
  }

  .hello {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(56px, 14vw, 104px);
    line-height: 0.98;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 0 0 28px;
    font-variation-settings: "opsz" 144, "SOFT" 50;
  }
  .hello .dot { color: var(--accent); }

  .lede {
    font-family: "Fraunces", serif;
    font-weight: 400;
    font-size: clamp(20px, 4.2vw, 26px);
    line-height: 1.4;
    color: var(--ink-soft);
    letter-spacing: -0.012em;
    max-width: 34ch;
    text-wrap: pretty;
    margin: 0 0 44px;
  }
  .lede em {
    font-style: italic;
    color: var(--accent-ink);
    font-variation-settings: "opsz" 14;
  }

  .letter {
    margin: 0 0 40px;
  }
  .letter-p {
    font-family: "Fraunces", serif;
    font-weight: 400;
    font-size: clamp(17px, 3.4vw, 19px);
    line-height: 1.6;
    color: var(--ink-soft);
    letter-spacing: -0.005em;
    max-width: 58ch;
    text-wrap: pretty;
    margin: 0 0 18px;
  }
  .letter-p:last-child { margin-bottom: 0; }

  .ps {
    font-family: "Homemade Apple", cursive;
    font-size: clamp(17px, 3.2vw, 20px);
    line-height: 1.55;
    color: var(--ink-mute);
    max-width: 28ch;
  }
  .ps .prefix {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 0.9em;
    margin-right: 6px;
    color: var(--ink-mute);
  }

  @keyframes breathe {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-2px); }
  }
  .hello { animation: breathe 7s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce) {
    .hello { animation: none; }
  }

  .countdown {
    display: inline-flex;
    align-items: baseline;
    gap: 12px;
    border-top: 1px solid var(--rule);
    border-bottom: 1px solid var(--rule);
    margin: 0 0 40px;
    width: 100%;
    justify-content: flex-start;
    padding: 18px 0;
    flex-wrap: wrap;
  }
  .cd-unit { display: flex; align-items: baseline; gap: 6px; }
  .cd-num {
    font-family: "Fraunces", serif;
    font-weight: 400;
    font-size: clamp(30px, 7vw, 48px);
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    min-width: 2ch;
    text-align: right;
  }
  .cd-num.cd-sec {
    color: var(--accent);
    font-weight: 300;
  }
  .cd-label {
    font-family: "Inter", sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-mute);
    text-transform: uppercase;
    letter-spacing: 0.14em;
  }
  .cd-sep {
    color: var(--rule);
    font-family: "Fraunces", serif;
    font-size: clamp(26px, 6vw, 40px);
    font-weight: 300;
    line-height: 1;
    align-self: center;
  }

  .hint {
    font-family: "Fraunces", serif;
    font-size: clamp(18px, 3.6vw, 22px);
    line-height: 1.45;
    color: var(--ink-soft);
    margin: 0 0 28px;
    max-width: 32ch;
    font-style: italic;
  }
  .hint .fmt {
    font-family: "JetBrains Mono", monospace;
    font-style: normal;
    font-size: 0.82em;
    background: var(--accent-soft);
    color: var(--accent-ink);
    padding: 2px 8px;
    border-radius: 3px;
    margin-left: 4px;
    letter-spacing: 0.05em;
  }

  .pw-wrap {
    position: relative;
    width: 100%;
    max-width: 340px;
  }
  .pw-input {
    width: 100%;
    font-family: "JetBrains Mono", monospace;
    font-size: clamp(28px, 6vw, 34px);
    font-weight: 500;
    letter-spacing: 0.18em;
    text-align: center;
    padding: 18px 44px 18px 16px;
    background: transparent;
    color: var(--ink);
    border: none;
    border-bottom: 1.5px solid var(--ink-mute);
    outline: none;
    caret-color: var(--accent);
    transition: border-color .2s ease;
    font-variant-numeric: tabular-nums;
  }
  .pw-input::placeholder {
    color: oklch(0.7 0 0 / 0.35);
    letter-spacing: 0.25em;
    font-weight: 400;
  }
  .pw-input:focus { border-bottom-color: var(--accent); }
  .pw-input:-webkit-autofill { box-shadow: 0 0 0 1000px var(--bg) inset; }

  .pw-submit {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    color: var(--ink-mute);
    cursor: pointer;
    display: grid;
    place-items: center;
    border-radius: 50%;
    transition: color .2s ease, background .2s ease, transform .2s ease;
  }
  .pw-submit:hover,
  .pw-submit:focus-visible {
    color: var(--accent);
    background: var(--accent-soft);
    outline: none;
    transform: translateY(-50%) translateX(2px);
  }
  .pw-submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .pw-error {
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 16px;
    color: var(--accent-ink);
    margin-top: 18px;
    min-height: 22px;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity .25s ease, transform .25s ease;
  }
  .pw-error.show {
    opacity: 1;
    transform: translateY(0);
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-1px); }
    20%, 80% { transform: translateX(2px); }
    30%, 50%, 70% { transform: translateX(-4px); }
    40%, 60% { transform: translateX(4px); }
  }
  .pw-wrap.shake { animation: shake .45s cubic-bezier(.36,.07,.19,.97) both; }
  @media (prefers-reduced-motion: reduce) {
    .pw-wrap.shake { animation: none; }
  }

  .pw-hint-key {
    font-family: "Inter", sans-serif;
    font-size: 12px;
    color: var(--ink-mute);
    margin-top: 14px;
    letter-spacing: 0.02em;
  }
  .pw-hint-key kbd {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    padding: 2px 6px;
    background: #fff;
    border: 1px solid var(--rule);
    border-bottom-width: 2px;
    border-radius: 4px;
    color: var(--ink-soft);
  }

  .reveal-seq {
    display: grid;
    place-items: center;
    min-height: clamp(240px, 70vw, 320px);
    margin: 0 0 28px;
  }
  .reveal-digit {
    font-family: "Fraunces", serif;
    font-weight: 300;
    font-size: clamp(120px, 30vw, 180px);
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--accent);
    font-variation-settings: "opsz" 144;
    animation: revealFlash 1000ms cubic-bezier(.5, 0, .5, 1) forwards;
    font-variant-numeric: tabular-nums;
  }
  @keyframes revealFlash {
    0%   { opacity: 0; transform: scale(0.88); }
    20%  { opacity: 1; transform: scale(1); }
    80%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.06); }
  }
  @media (prefers-reduced-motion: reduce) {
    .reveal-digit { animation: none; opacity: 1; }
  }

  .celebrate {
    text-align: center;
    margin: 0 0 28px;
    animation: celebrateIn 500ms ease-out;
  }
  .celebrate-head {
    font-family: "Fraunces", serif;
    font-weight: 500;
    font-size: clamp(22px, 4.4vw, 28px);
    line-height: 1.3;
    color: var(--ink);
    letter-spacing: -0.015em;
    max-width: 22ch;
    text-wrap: pretty;
    margin: 0 auto 8px;
  }
  @keyframes celebrateIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .celebrate { animation: none; }
  }

  .incoming {
    display: block;
    width: 180px;
    height: 180px;
    margin: 20px auto;
  }
  .incoming-petal {
    fill: var(--saffron);
    opacity: 0;
    transform-origin: 90px 90px;
    animation: incomingBloom 4s ease-out infinite;
    animation-delay: var(--d, 0s);
  }
  .incoming-center {
    fill: var(--accent);
    transform-origin: 90px 90px;
    animation: incomingCenter 4s ease-out infinite;
  }
  @keyframes incomingBloom {
    0%, 10% { opacity: 0; transform: rotate(var(--r, 0deg)) scale(0.1); }
    35%     { opacity: 1; transform: rotate(var(--r, 0deg)) scale(1); }
    80%     { opacity: 1; transform: rotate(var(--r, 0deg)) scale(1); }
    100%    { opacity: 0; transform: rotate(var(--r, 0deg)) scale(0.95); }
  }
  @keyframes incomingCenter {
    0%, 30% { transform: scale(0); }
    45%, 80% { transform: scale(1); }
    100%    { transform: scale(0.9); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .incoming-petal { animation: none; opacity: 1; transform: rotate(var(--r, 0deg)) scale(1); }
    .incoming-center { animation: none; opacity: 1; transform: scale(1); }
  }

  /* floating hearts — page-wide subtle background */
  .hearts-bg {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: -1;
  }
  .hearts-bg svg {
    position: absolute;
    bottom: -40px;
    color: var(--accent);
    opacity: 0;
    animation: heartRise var(--s, 14s) linear infinite;
    animation-delay: var(--d, 0s);
    will-change: transform, opacity;
  }
  @keyframes heartRise {
    0%   { transform: translate(0, 0) rotate(-6deg);                             opacity: 0;           }
    10%  {                                                                        opacity: var(--peak, 0.15); }
    90%  {                                                                        opacity: var(--peak, 0.15); }
    100% { transform: translate(calc(var(--drift, 0) * 1px), calc(-100vh - 80px)) rotate(6deg); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hearts-bg { display: none; }
  }

  .seal {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: grid;
    place-items: center;
    font-family: "Fraunces", serif;
    font-style: italic;
    font-size: 18px;
    font-weight: 400;
    transform: rotate(-12deg);
    box-shadow: 0 2px 0 rgba(0,0,0,.08), 0 8px 24px -6px rgba(140,60,30,.35);
    opacity: 0.88;
    pointer-events: none;
    z-index: 2;
  }
  .seal::before {
    content: "";
    position: absolute;
    inset: 4px;
    border: 1px dashed rgba(255,255,255,.4);
    border-radius: 50%;
  }
  @media (max-width: 520px) {
    .seal { bottom: 20px; right: 20px; width: 48px; height: 48px; font-size: 16px; }
  }

  .state-layer {
    transition: opacity .45s ease, transform .45s cubic-bezier(.2,.7,.2,1);
  }
  .state-layer.idle {
    opacity: 1;
    transform: translateY(0);
  }
  @media (prefers-reduced-motion: reduce) {
    .state-layer { transition: opacity .2s ease; transform: none; }
  }

  .confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 3;
  }
  .confetti span {
    position: absolute;
    width: 8px; height: 12px;
    top: 40%;
    left: 50%;
    opacity: 0;
    will-change: transform, opacity;
  }
  @keyframes burst {
    0%   { opacity: 1; transform: translate(0,0) rotate(0); }
    100% { opacity: 0; transform: var(--to) rotate(540deg); }
  }
  .confetti.go span { animation: burst 1.2s cubic-bezier(.15,.6,.3,1) forwards; }
  @media (prefers-reduced-motion: reduce) {
    .confetti.go span { animation: none; opacity: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="app.js"></script>
</body>
</html>
